name: Sync with upstream

on:
  schedule:
    - cron: "0 0 * * *" # 每天 0:00 执行
  workflow_dispatch: # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false # 防止泄露 token
          fetch-depth: 0 # 获取完整 Git 历史

      - name: Set up Git
        run: |
          git config user.name "liyitenga"
          git config user.email "liyiteng@gmail.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/huggingface/lerobot.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Rebase on upstream/main
        run: |
          git checkout main
          git rebase upstream/main
          
      - name: Set up Git credentials
        run: |
          git config --global credential.helper store
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"


      - name: Force push rebased changes to origin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push --force-with-lease origin main
